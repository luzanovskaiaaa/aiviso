server {
    listen 80;
    server_name aiviso.ru www.aiviso.ru api.aiviso.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aiviso.ru www.aiviso.ru;

    ssl_certificate /etc/letsencrypt/live/aiviso.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiviso.ru/privkey.pem;

    client_max_body_size 25M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.aiviso.ru;

    ssl_certificate /etc/letsencrypt/live/aiviso.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiviso.ru/privkey.pem;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
